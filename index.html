<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Powerpuff Designers Dashboard</title>
<style>
:root{ color-scheme: light; }
*{ box-sizing:border-box; }
body{ margin:0; background:#f6f7f9; color:#1f2430;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; font-size:14px; line-height:1.45;}
h1,h2,h3{ margin:0; font-weight:650; letter-spacing:.2px; }
.wrap{ max-width:1280px; margin:0 auto; padding:18px 20px 60px; }
.top{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:14px; }
.brand{ font-size:20px; font-weight:700; letter-spacing:2px; }
.brand small{ display:block; font-size:11px; letter-spacing:.5px; color:#8a92a3; font-weight:500; margin-top:2px; }
.toolbar{ display:flex; gap:8px; flex-wrap:wrap; }
.btn{ border:1px solid #d5d9e0; background:#fff; color:#374151; border-radius:8px; padding:7px 12px; font-size:12.5px; cursor:pointer; font-weight:550; }
.btn:hover{ background:#f0f2f5; }
.btn.primary{ background:#1f2430; color:#fff; border-color:#1f2430; }
.btn.primary:hover{ background:#333a4a; }
.btn.sync{ background:#2563eb; color:#fff; border-color:#2563eb; }
.btn.sync[data-n="0"]{ opacity:.45; }
.tabs{ display:flex; gap:4px; border-bottom:1px solid #e3e6ea; margin-bottom:16px; flex-wrap:wrap; }
.tab{ padding:9px 14px; cursor:pointer; border:none; background:none; font-size:14px; color:#6b7280; font-weight:600; border-bottom:2px solid transparent; }
.tab.active{ color:#1f2430; border-bottom-color:#1f2430; }
#topTabs{ margin-bottom:8px; }
.subtabs{ display:flex; gap:6px; margin:0 0 16px; flex-wrap:wrap; }
.subtab{ padding:6px 12px; cursor:pointer; border:1px solid #e3e6ea; background:#fff; border-radius:8px; font-size:13px; color:#6b7280; font-weight:600; }
.subtab.active{ color:#1f2430; border-color:#9aa3b2; background:#f3f5f8; }
.addline{ margin:0 0 12px; }
.subtoggle{ display:flex; gap:6px; margin-bottom:14px; }
.subtoggle .btn.on{ background:#1f2430; color:#fff; border-color:#1f2430; }
.section-title{ font-size:12px; text-transform:uppercase; letter-spacing:1.2px; color:#8a92a3; margin:22px 0 10px; font-weight:700; display:flex; align-items:center; gap:8px;}
.factory-tag{ font-size:10px; background:#eceef2; color:#5b6472; padding:2px 7px; border-radius:20px; letter-spacing:.5px;}
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(244px,1fr)); gap:12px; }
.card{ background:#fff; border:1px solid #e6e9ee; border-left-width:4px; border-radius:11px; padding:12px 13px; box-shadow:0 1px 2px rgba(20,30,50,.04); }
.card h3{ font-size:13.5px; line-height:1.3; }
.card .meta{ display:flex; align-items:center; gap:6px; margin:6px 0 9px; flex-wrap:wrap; }
.phase{ font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.4px; text-transform:uppercase; }
.phase.ready{ background:#dcfce7; color:#15803d; }
.phase.in-production{ background:#dbeafe; color:#1d4ed8; }
.phase.design{ background:#eef0f3; color:#5b6472; }
.phase.paused{ background:#f3f4f6; color:#9aa1ad; }
.phase.live{ background:#ccfbf1; color:#0f766e; }
.facets{ display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.pill{ display:flex; align-items:center; justify-content:space-between; gap:6px; border-radius:7px; padding:5px 8px; cursor:pointer; user-select:none; border:1px solid transparent; font-size:11px; }
.pill .lab{ font-weight:600; opacity:.75; text-transform:capitalize; }
.pill .val{ font-weight:700; }
.pill:hover{ filter:brightness(.97); outline:1px solid rgba(0,0,0,.06); }
.s-not-started{ background:#eef0f2; color:#6b7280; }
.s-doing{ background:#dbeafe; color:#1d4ed8; }
.s-needs-review{ background:#ede9fe; color:#6d28d9; }
.s-stuck{ background:#fef3c7; color:#b45309; }
.s-approved{ background:#dcfce7; color:#15803d; }
.bd-not-started{ border-left-color:#cbd2db; }
.bd-doing{ border-left-color:#3b82f6; }
.bd-needs-review{ border-left-color:#8b5cf6; }
.bd-stuck{ border-left-color:#f59e0b; }
.bd-approved{ border-left-color:#22c55e; }
.note{ font-size:11.5px; color:#7a8294; margin-top:9px; line-height:1.35; }
.cardfoot{ display:flex; align-items:center; justify-content:space-between; margin-top:10px; gap:6px; }
.miniqa{ font-size:11px; border:1px solid #d5d9e0; background:#fff; border-radius:7px; padding:4px 9px; cursor:pointer; color:#374151; font-weight:600;}
.miniqa:hover{ background:#f0f2f5; }
.mdlink{ font-size:10.5px; color:#aab0bd; }
.cols{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.col{ background:#eef0f3; border-radius:12px; padding:12px; min-height:200px; }
.col h2{ font-size:13px; text-transform:uppercase; letter-spacing:1px; color:#5b6472; margin-bottom:10px; display:flex; justify-content:space-between;}
.tcard{ background:#fff; border:1px solid #e6e9ee; border-left-width:4px; border-radius:9px; padding:9px 11px; margin-bottom:8px; }
.tcard p{ margin:0 0 7px; font-size:12.5px; line-height:1.35; }
.tcard .row{ display:flex; align-items:center; gap:6px; justify-content:space-between; }
.linktag{ font-size:10px; background:#eceef2; color:#5b6472; padding:2px 7px; border-radius:6px;}
.inbox-area{ display:flex; gap:8px; flex-wrap:wrap; }
textarea{ flex:1; min-width:280px; min-height:80px; border:1px solid #d5d9e0; border-radius:9px; padding:10px; font:inherit; resize:vertical; }
.help{ background:#fff; border:1px solid #e6e9ee; border-radius:11px; padding:14px 16px; margin-bottom:16px; color:#5b6472; font-size:12.5px; line-height:1.5;}
.help b{ color:#1f2430; }
.next-grp{ margin-bottom:18px; }
.next-grp h3{ font-size:13px; margin-bottom:8px; }
.next-item{ background:#fff; border:1px solid #e6e9ee; border-radius:9px; padding:9px 12px; margin-bottom:7px; font-size:12.5px; display:flex; justify-content:space-between; gap:10px; align-items:center;}
.legend{ display:flex; gap:10px; flex-wrap:wrap; font-size:11px; color:#7a8294; margin-bottom:6px; }
.legend span{ display:inline-flex; align-items:center; gap:5px; }
.dot{ width:10px; height:10px; border-radius:3px; display:inline-block; }
.hidden{ display:none; }
.muted{ color:#9aa1ad; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stickytop">
  <div class="top">
    <div class="brand">POWERPUFF DESIGNERS DASHBOARD</div>
    <div class="toolbar">
      <span id="saveind" class="saveind">● connecting…</span>
    </div>
  </div>

  <div class="tabs" id="topTabs"></div>
  <div class="subtabs" id="subTabs"></div>
  </div><!--/stickytop-->

  <!-- PACKAGING -->
  <div id="packaging" class="pane">
    <div class="filterbar" id="fb-pkg"></div>
    <div id="pkgbody"></div>
  </div>

  <!-- WEB -->
  <div id="web" class="pane hidden">
    <div class="filterbar" id="fb-web"></div>
    <div id="webbody"></div>
  </div>

  <!-- DAILY -->
  <div id="daily" class="pane hidden">
    <div id="todaystrip" class="todaystrip"></div>
    <div class="dailybar">Sort:
      <select id="sortSel" class="sortsel" onchange="setSort(this.value)">
        <option value="manual">Manual</option>
        <option value="working" selected>🛠 Working + 🔥 urgent first</option>
        <option value="urgent">🔥 Urgent first</option>
        <option value="status">By status</option>
        <option value="mine">★ Mine first</option>
        <option value="type">By type</option>
        <option value="az">A–Z</option>
      </select>
      <span style="flex:1"></span>
      <button class="fchip" onclick="foldAllTasks()">⊟ Collapse cards</button>
      <button class="fchip" onclick="unfoldAllTasks()">⊞ Expand cards</button>
    </div>
    <div class="cols cols4">
      <div class="col"><h2>🎨 Design team <span class="muted" id="c-we">0</span><button class="addbtn" onclick="addTask('we')">＋</button></h2><div id="lane-we"></div></div>
      <div class="col"><h2>🏭 Factory <span class="muted" id="c-factory">0</span><button class="addbtn" onclick="addTask('factory')">＋</button></h2><div id="lane-factory"></div></div>
      <div class="col"><h2>👤 Hamid <span class="muted" id="c-hamid">0</span><button class="addbtn" onclick="addTask('hamid')">＋</button></h2><div id="lane-hamid"></div></div>
      <div class="col"><h2>💡 Ideas <span class="muted" id="c-ideas">0</span><button class="addbtn" onclick="addTask('ideas')">＋</button></h2><div id="lane-ideas"></div></div>
    </div>
  </div>

</div>

async function apiLoad(){

function save(){ if(saveTimer)clearTimeout(saveTimer); setStatus('saving…','saving'); saveTimer=setTimeout(doSave,100); }   // every change → instant POST
async function doSave(){ saving=true;

    const { error } = await sb.from('board').upsert({ id:BOARD_ID, data:DB, updated_at:new Date().toISOString(), updated_by:(CURRENT_USER&&CURRENT_USER.email)||null });
    if(error) throw error;
    suppressUntil=Date.now()+1500; setStatus('saved · live','ok');
  }catch(e){ setStatus('save failed — '+(e.message||e),'err'); }
  saving=false;
}
function connectSSE(){   // live updates: Supabase pushes when anyone (you, a teammate, or Claude) changes the board
  sb.channel('board-rt')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'board',filter:'id=eq.'+BOARD_ID}, async ()=>{
      if(saving||Date.now()<suppressUntil) return;
      if(document.querySelector('.popmenu,.overlay,.subinput')) return;   // don't yank the UI mid-edit
      try{ DB=await apiLoad(); ensure(); render(); setStatus('updated · live','ok'); }catch(e){}
    })
    .subscribe();
}

/* ---------- helpers ---------- */
function rollup(items){ const v=(items||[]).map(i=>i.status); if(!v.length)return "not-started"; if(v.includes("stuck"))return "stuck"; if(v.includes("paused"))return "paused"; let best="not-started",bs=99; v.forEach(s=>{ const st=STAGE[s]; if(st!=null&&st<bs){bs=st;best=s;} }); return best; }
function slugify(s){ return s.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,48)||('item-'+Date.now().toString(36)); }
function uniqueId(base,exists){ let id=base,n=2; while(exists(id)){ id=base+'-'+n; n++; } return id; }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ensure(){ DB.inbox=DB.inbox||[]; DB.ideas=DB.ideas||[];
  if(Array.isArray(DB.web)){ /* migrate OLD shape (products.items + web[]) -> NEW (products.packaging + products.web + pages[]) */
    const pdpByPid={}, oldPages=[];
    DB.web.forEach(w=>{ const pid=(w.group==='pdp'&&w.id&&w.id.indexOf('pdp-')===0)?w.id.slice(4):null; if(pid){ pdpByPid[pid]=w; } else { const g={id:w.id,name:w.name,items:w.items||[],notes:w.notes||''}; if(w.override)g.override=w.override; oldPages.push(g); } });
    DB.products.forEach(p=>{ p.packaging=p.packaging||p.items||[]; if(p.web===undefined){ const w=pdpByPid[p.id]; p.web=w?(w.items||[]):[]; if(w){ if(!p.notes&&w.notes)p.notes=w.notes; if(w.override)p.webOverride=w.override; } } delete p.items; });
    DB.pages=(Array.isArray(DB.pages)?DB.pages:[]).concat(oldPages); delete DB.web; }
  DB.pages=DB.pages||[];
  DB.products.forEach(p=>{ p.packaging=p.packaging||[]; p.web=p.web||[]; });
  DB.pages.forEach(g=>{ g.items=g.items||[]; });
  DB.tasks.forEach(t=>{ if(!t.type)t.type='ops'; if(t.urgent===undefined)t.urgent=false; });
  DB.brands=(Array.isArray(DB.brands)&&DB.brands.length)?DB.brands:[{id:'forchics',label:'FORCHICS'},{id:'quia',label:'QUIA'}];
  DB.lines=DB.lines||{}; Object.keys(DB.lines).forEach(k=>{ if(!DB.lines[k].brand)DB.lines[k].brand='forchics'; });
  DB.products.forEach(p=>{ if(!p.brand)p.brand='forchics'; });
  DB.pages.forEach(g=>{ if(!g.brand)g.brand='forchics'; }); }
function _res(scope,id){ if(scope==='page'){ const g=DB.pages.find(x=>x.id===id); return g?{o:g,arr:'items',ovf:'override'}:null; } const p=DB.products.find(x=>x.id===id); if(!p)return null; return scope==='web'?{o:p,arr:'web',ovf:'webOverride'}:{o:p,arr:'packaging',ovf:'override'}; }
function pkgStatus(p){ return p.override||rollup(p.packaging); }
function webStatus(p){ return p.webOverride||rollup(p.web); }
function pageStatus(g){ return g.override||rollup(g.items); }
function scopeStatus(scope,id){ const r=_res(scope,id); return r?(r.o[r.ovf]||rollup(r.o[r.arr])):'not-started'; }
function combinedStatus(p){ const parts=[]; if((p.packaging||[]).length)parts.push({status:pkgStatus(p)}); if((p.web||[]).length)parts.push({status:webStatus(p)}); return parts.length?rollup(parts):'not-started'; }
function statusOf(o){ return o.override||rollup(o.items); }
function chip(ro){ return `<span class="chip s-${ro}">${LABELS[ro]}</span>`; }
function isCollapsed(k){ return collapsed.has(k); }
function toggleCollapse(k){ collapsed.has(k)?collapsed.delete(k):collapsed.add(k); saveCollapsed(); render(); }
function collapseAll(){ const blab=(DB.brands.find(b=>b.id===brandTab)||{}).label||brandTab; const ks=new Set(['web:'+brandTab+':pdp','web:'+brandTab+':pages']); Object.entries(DB.lines).forEach(([lid,l])=>{ if((l.brand||'forchics')===brandTab) ks.add('pkg:'+brandTab+':'+(l.factory||blab)); }); collapsed=ks; saveCollapsed(); render(); }
function expandAll(){ collapsed=new Set(); saveCollapsed(); render(); }
function toggleFilter(k){ filters[k]=!filters[k]; saveFilters(); render(); }
function visible(ro){ return !filters[ro]; }

function itemsOf(scope,id){ const r=_res(scope,id); return r?r.o[r.arr]:null; }
function nameOf(scope,id){ const r=_res(scope,id); return r?r.o.name:id; }
function setSub(kind,id,idx,status){ closeMenus(); const arr=itemsOf(kind,id); const it=arr[idx]; if(!it||it.status===status)return; it.status=status; save(); render(); }

function addSubInline(ev,kind,id){ ev.stopPropagation(); const btn=ev.currentTarget; const inp=document.createElement('input'); inp.className='subinput'; inp.placeholder='New part…'; btn.replaceWith(inp); inp.focus(); let done=false;

function setSort(m){ sortMode=m; renderDaily(); }
function sortItems(items){ const a=items.slice();
  if(sortMode==='az') a.sort((x,y)=>x.title.localeCompare(y.title));
  else if(sortMode==='status') a.sort((x,y)=>(SORT_PRI[x.status]??9)-(SORT_PRI[y.status]??9));
  else if(sortMode==='working') a.sort((x,y)=> ((y.urgent?1:0)-(x.urgent?1:0)) || ((WORK_PRI[x.status]??9)-(WORK_PRI[y.status]??9)) );
  else if(sortMode==='mine') a.sort((x,y)=>(y.mine?1:0)-(x.mine?1:0));
  else if(sortMode==='urgent') a.sort((x,y)=>(y.urgent?1:0)-(x.urgent?1:0));
  else if(sortMode==='type') a.sort((x,y)=>TYPES.indexOf(x.type||'ops')-TYPES.indexOf(y.type||'ops'));
  return a; }

/* ---------- task title + subtasks ---------- */
function inlineEdit(el,value,multiline,onSave){
  const ta=document.createElement('textarea'); ta.className='inlineedit'; ta.value=value; const h=Math.max(el.offsetHeight,22);
  el.replaceWith(ta); ta.style.height=h+'px'; ta.focus(); ta.select();
  const grow=()=>{ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }; grow();
  let done=false;
  const commit=ok=>{ if(done)return; done=true; const v=ta.value.replace(/\s+$/,''); if(ok && v!==value) onSave(v); render(); };
  ta.oninput=grow; ta.onkeydown=e=>{ if(e.key==='Escape'){e.preventDefault();commit(false);} if(e.key==='Enter'&&!multiline){e.preventDefault();commit(true);} }; ta.onblur=()=>commit(true);
}
function editTaskTitleInline(ev,id){ ev.stopPropagation(); const t=DB.tasks.find(x=>x.id===id); inlineEdit(ev.currentTarget, t.title, false, v=>{ if(v){ t.title=v; save(); } }); }
function editTaskDesc(ev,id){ ev.stopPropagation(); const t=DB.tasks.find(x=>x.id===id); inlineEdit(ev.currentTarget, t.description||'', true, v=>{ t.description=v; save(); }); }
function addDescInline(ev,id){ ev.stopPropagation(); const t=DB.tasks.find(x=>x.id===id); inlineEdit(ev.currentTarget, '', true, v=>{ if(v){ t.description=v; collapsed.add('descopen:'+id); saveCollapsed(); save(); } }); }
function toggleDescFold(id){ const k='descopen:'+id; collapsed.has(k)?collapsed.delete(k):collapsed.add(k); saveCollapsed(); render(); }
function toggleCardFold(id){ const k='cardfold:'+id; collapsed.has(k)?collapsed.delete(k):collapsed.add(k); saveCollapsed(); render(); }
function foldAllTasks(){ DB.tasks.forEach(t=>collapsed.add('cardfold:'+t.id)); saveCollapsed(); render(); }
function unfoldAllTasks(){ DB.tasks.forEach(t=>collapsed.delete('cardfold:'+t.id)); saveCollapsed(); render(); }
function taskSubs(id){ const t=DB.tasks.find(x=>x.id===id); t.subtasks=t.subtasks||[]; return t.subtasks; }
function addSubtaskInline(ev,id){ ev.stopPropagation(); const btn=ev.currentTarget; const inp=document.createElement('input'); inp.className='subinput'; inp.placeholder='New subtask…'; btn.replaceWith(inp); inp.focus(); let done=false;
  const commit=ok=>{ if(done)return; done=true; const v=inp.value.trim(); if(ok&&v){ taskSubs(id).push({text:v,done:false}); collapsed.delete('task:'+id); saveCollapsed(); save(); } render(); };
  inp.onkeydown=e=>{ if(e.key==='Enter')commit(true); if(e.key==='Escape')commit(false); }; inp.onblur=()=>commit(true); }
function toggleSubtask(id,idx){ const s=taskSubs(id)[idx]; s.done=!s.done; save(); render(); }
function renameSubtask(id,idx){ const s=taskSubs(id); askText('Edit subtask', s[idx].text, v=>{ s[idx].text=v; save(); render(); }); }
function delSubtask(id,idx){ taskSubs(id).splice(idx,1); save(); render(); }
function toggleTaskFold(id){ const k='task:'+id; collapsed.has(k)?collapsed.delete(k):collapsed.add(k); saveCollapsed(); render(); }

  ov.querySelector('#dNote').onchange=e=>setProdNotes(id,e.target.value); ov.querySelector('#dLinks').onchange=e=>setProdLinks(id,e.target.value);

function editNoteInline(ev,scope,id){ ev.stopPropagation(); const o=scope==='page'?DB.pages.find(x=>x.id===id):DB.products.find(x=>x.id===id); if(!o)return; inlineEdit(ev.currentTarget, o.notes||'', true, v=>{ if(scope==='page')setPageNotes(id,v); else setProdNotes(id,v); }); }

function pageCard(g){ const ro=pageStatus(g);
  return `<div class="card bg-${ro}"><div class="chiprow">${overallChip('page',g.id)}<div class="topbtns"><button class="delbtn" onclick="delPage('${g.id}')">✕</button></div></div>
    <div class="cardtop"><h3>${esc(g.name)}</h3></div>${pillsHtml('page',g.id,g.items)}${sticky('page',g.id,g.notes)}</div>`; }
function taskCard(t){
  const subs=t.subtasks||[]; const dn=subs.filter(s=>s.done).length; const folded=isCollapsed('task:'+t.id);
  let chk='';
  if(subs.length){ chk+=`<div class="checkhdr" onclick="toggleTaskFold('${t.id}')"><span class="caret">${folded?'▸':'▾'}</span>Checklist <span class="muted">${dn}/${subs.length}</span></div>`;
    if(!folded){ chk+='<div class="checklist">'+subs.map((s,i)=>`<div class="chkitem ${s.done?'done':''}"><input type="checkbox" ${s.done?'checked':''} onclick="event.stopPropagation()" onchange="toggleSubtask('${t.id}',${i})"><span class="chktext" onclick="renameSubtask('${t.id}',${i})">${esc(s.text)}</span><button class="delbtn" onclick="delSubtask('${t.id}',${i})">✕</button></div>`).join('')+`<button class="subadd2" onclick="addSubtaskInline(event,'${t.id}')">＋ subtask</button></div>`; } }
  else { chk=`<button class="subadd2" onclick="addSubtaskInline(event,'${t.id}')">＋ subtask</button>`; }
  const dOpen=collapsed.has('descopen:'+t.id); let desc='';
  if(t.description){ desc=`<div class="deschdr" onclick="toggleDescFold('${t.id}')"><span class="caret">${dOpen?'▾':'▸'}</span>Description</div>`+(dOpen?`<div class="desc" title="Click to edit" onclick="editTaskDesc(event,'${t.id}')">${esc(t.description)}</div>`:''); }
  else { desc=`<button class="subadd2" onclick="addDescInline(event,'${t.id}')">＋ description</button>`; }
  const cardFolded=isCollapsed('cardfold:'+t.id);
  const dragattrs=`draggable="true" ondragstart="dragStart('task','${t.id}',event)" ondragend="dragEnd()" ondragover="event.preventDefault();event.stopPropagation();this.classList.add('insert')" ondragleave="this.classList.remove('insert')" ondrop="event.preventDefault();event.stopPropagation();this.classList.remove('insert');if(drag&&drag.kind==='task')moveTask(drag.id,'${t.id}','OWNER')"`;
  const check=`<button class="taskcheck ${t.done?'on':''}" title="${t.done?'Mark not done':'Cross out (done)'}" onclick="event.stopPropagation();toggleDone('${t.id}')">${t.done?'☑':'☐'}</button>`;
  const head=`<div class="cardtop"><button class="cardcaret" title="Fold / unfold this card" onclick="event.stopPropagation();toggleCardFold('${t.id}')">${cardFolded?'▸':'▾'}</button>${check}<div class="ttitle ${t.done?'doneT':''}" title="Click to edit" onclick="editTaskTitleInline(event,'${t.id}')">${esc(t.title)}</div><button class="delbtn" onclick="delTask('${t.id}')">✕</button></div>`;
  if(cardFolded){ return `<div class="tcard ${t.done?'donecard':''} ${t.urgent?'urgentcard':''} folded" ${dragattrs}>${head}<div class="foldmeta">${subs.length?`<span class="muted">✓ ${dn}/${subs.length}</span>`:''}${t.urgent?'<span class="muted">🔥</span>':''}${t.mine?'<span class="muted">★</span>':''}</div></div>`; }
  return `<div class="tcard ${t.done?'donecard':''} ${t.urgent?'urgentcard':''}" ${dragattrs}>
    ${head}
    <div class="tagrow"><button class="urg ${t.urgent?'on':''}" title="Urgent" onclick="toggleUrgent('${t.id}')">🔥</button><button class="startag ${t.mine?'on':''}" title="Mine" onclick="toggleMine('${t.id}')">★</button></div>
    <div class="descblock">${desc}</div>
    <div class="checkblock">${chk}</div></div>`; }

function renderFilterbar(){ const chipBtn=(k,label)=>`<button class="fchip ${filters[k]?'on':''}" onclick="toggleFilter('${k}')">${filters[k]?'☑':'☐'} Hide ${label}</button>`;

  ['fb-pkg','fb-web'].forEach(id=>{ const fb=document.getElementById(id); if(fb) fb.innerHTML=html; }); }
function renderPackaging(){ const blab=(DB.brands.find(b=>b.id===brandTab)||{}).label||brandTab;
  const byF={}; Object.entries(DB.lines).forEach(([lid,l])=>{ if((l.brand||'forchics')!==brandTab)return; const fk=l.factory||blab; (byF[fk]=byF[fk]||[]).push(lid); });
  let h=`<div class="addline"><button class="addbtn" onclick="addLine('${brandTab}')">＋ add line</button></div>`;
  for(const fac of Object.keys(byF)){ const fk='pkg:'+brandTab+':'+fac; h+=collHeader(fk,fac,''); if(!isCollapsed(fk)){ h+='<div class="secbody">';
    for(const lid of byF[fac]){ const all=DB.products.filter(p=>p.line===lid); const prods=all.filter(p=>visible(pkgStatus(p)));
      const key='pkg:'+brandTab+':'+lid;
      h+=collHeader(key,`${DB.lines[lid].label} <span class="muted">(${prods.length}/${all.length})</span>`,`<button class="addbtn" onclick="addProduct('${lid}',event)">＋ product</button>`);
      if(!isCollapsed(key)) h+=`<div class="grid linewrap" data-line="${lid}" ondragover="if(drag&&drag.kind==='product'){event.preventDefault();this.classList.add('dragover')}" ondragleave="this.classList.remove('dragover')" ondrop="this.classList.remove('dragover');if(drag&&drag.kind==='product')moveProduct(drag.id,'${lid}')">${prods.map(prodCard).join("")||'<div class="muted" style="font-size:12px">None shown.</div>'}</div>`; } h+='</div>'; } }
  if(!Object.keys(byF).length) h+=`<div class="muted" style="font-size:12.5px;padding:10px 2px">No lines yet — use “＋ add line” to start.</div>`;
  document.getElementById('pkgbody').innerHTML=h; }
function renderWeb(){
  const lines=Object.entries(DB.lines).filter(([lid,l])=>(l.brand||'forchics')===brandTab);
  let h=collHeader('web:'+brandTab+':pdp',`Product pages (PDPs) — by line`,'');
  if(!isCollapsed('web:'+brandTab+':pdp')){
    h+='<div class="secbody">'; let any=false;
    for(const [lid,l] of lines){ const all=DB.products.filter(p=>p.line===lid); if(!all.length)continue; any=true;
      const shown=all.filter(p=>visible(webStatus(p))); const key='web:'+brandTab+':'+lid;

      if(!isCollapsed(key)) h+=`<div class="grid">${shown.map(webCard).join("")||'<div class="muted" style="font-size:12px">None shown.</div>'}</div>`;
    }

function autoItemsFor(owner){ const map={we:['not-started','designing'],factory:['producing-samples'],hamid:['needs-review']}; const want=map[owner]; if(!want)return []; const out=[];
  DB.products.forEach(p=>{ (p.packaging||[]).forEach(it=>{ if(want.includes(it.status))out.push({pid:p.id,name:p.name,label:it.label,status:it.status,tag:'packaging'}); }); (p.web||[]).forEach(it=>{ if(want.includes(it.status))out.push({pid:p.id,name:p.name,label:it.label,status:it.status,tag:'website'}); }); });
  DB.pages.forEach(g=>{ (g.items||[]).forEach(it=>{ if(want.includes(it.status))out.push({pid:null,name:g.name,label:it.label,status:it.status,tag:'page'}); }); });

function autoRow(it){ const act=it.pid?`openDetail('${it.pid}')`:"setTab('web')"; return `<div class="autorow" onclick="${act}"><span class="pdot s-${it.status}"></span><span class="autonm">${esc(it.name)} — ${esc(it.label)}</span><span class="autotag">${esc(it.tag)}</span></div>`; }
function renderDaily(){ LANES.forEach(o=>{ const items=sortItems(DB.tasks.filter(t=>t.owner===o)); const lane=document.getElementById(OWNER_LANE[o]); if(!lane)return;

  const auto=autoItemsFor(o); if(auto.length){ const cap=15; const shown=auto.slice(0,cap); html+=`<div class="autosec"><div class="autohdr">On the board <span class="muted" style="font-weight:400">(${auto.length})</span></div>${shown.map(autoRow).join("")}${auto.length>cap?`<div class="automore">+ ${auto.length-cap} more</div>`:''}</div>`; }
  lane.innerHTML=html;

  lane.ondragover=e=>{ if(drag&&drag.kind==='task'){ e.preventDefault(); lane.classList.add('dragover'); } }; lane.ondragleave=()=>lane.classList.remove('dragover'); lane.ondrop=e=>{ lane.classList.remove('dragover'); if(drag&&drag.kind==='task') moveTask(drag.id,null,o); }; }); }
function renderTodayStrip(){ const el=document.getElementById('todaystrip'); if(!el)return;
  const today=DB.tasks.filter(t=>t.today);
